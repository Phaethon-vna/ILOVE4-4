<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật bé Nanh yêu dấu <3 <3 </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #000;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        .container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid #ff69b4;
            box-shadow: 0 0 20px #ff69b4;
        }

        h1 {
            font-size: 3rem;
            color: #ff69b4;
            text-shadow: 0 0 10px #fff;
            margin-bottom: 20px;
        }

        p { font-size: 1.5rem; margin-bottom: 30px; }

        .btn-group { display: flex; justify-content: center; gap: 20px; }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        #btnYes {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 0 15px #ff69b4;
        }

        #btnYes:hover { transform: scale(1.2); }

        /* --- STYLE CHO POPUP (MODAL) --- */
        #birthdayModal {
            display: none; /* Ẩn lúc đầu */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 30px;
            z-index: 100;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.8);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        #birthdayModal h2 { color: #ff69b4; margin-top: 0; }
        #birthdayModal p { font-size: 1.1rem; line-height: 1.6; color: #555; }
        
        .close-btn {
            background: #ff69b4;
            color: white;
            margin-top: 20px;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="container" id="mainCard">
        <h1 id="title">Chúc Mừng Sinh Nhật bé Nanh! 🎂</h1>
        <p id="message">Hôm nay bé Nanh có dễ thương hem ?</p>
        <div class="btn-group">
            <button id="btnYes" onclick="celebrate()">CÓ!</button>
            <button id="btnNo">KHÔNG</button>
        </div>
    </div>

    <div id="birthdayModal">
        <h2>Bất ngờ chưa!! ✨</h2>
        <p>Anh biết mà, Nanh lúc nào cũng đáng yêu nhất quả đất! Chúc em tuổi mới luôn xinh đẹp, hạnh phúc và mãi bên cạnh anh nhé. Yêu Nanh quá đi Chụt Chụt ❤️</p>
        <button class="close-btn" onclick="closeModal()">Cảm ơn anh ❤️</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btnNo = document.getElementById('btnNo');
        const modal = document.getElementById('birthdayModal');
        const bgMusic = document.getElementById('bgMusic');

        // Nút Không chạy trốn
        btnNo.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            btnNo.style.position = 'absolute';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        });

        function celebrate() {
            // Hiện Popup thay vì alert
            modal.style.display = 'block';
            bgMusic.play();
            
            // Làm cho pháo hoa nổ liên tục khi mở popup
            fireworkInterval = setInterval(() => {
                createFirework(Math.random() * canvas.width, Math.random() * canvas.height);
            }, 200);
        }

        function closeModal() {
            modal.style.display = 'none';
            clearInterval(fireworkInterval); // Trở về tốc độ pháo hoa bình thường
        }

        // --- CODE PHÁO HOA GIỮ NGUYÊN ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        let fireworkInterval;

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
                this.alpha = 1; this.friction = 0.95;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
            update() {
                this.velocity.x *= this.friction; this.velocity.y *= this.friction;
                this.x += this.velocity.x; this.y += this.velocity.y;
                this.alpha -= 0.01;
            }
        }

        function createFirework(x, y) {
            const color = `hsl(${Math.random() * 360}, 50%, 50%)`;
            for (let i = 0; i < 50; i++) { particles.push(new Particle(x, y, color)); }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                if (p.alpha > 0) { p.update(); p.draw(); } 
                else { particles.splice(i, 1); }
            });
        }

        setInterval(() => {
            createFirework(Math.random() * canvas.width, Math.random() * canvas.height);
        }, 800);

        animate();
    </script>
</body>
</html>
